<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Listing Poster</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 340px; background: #0A1120; color: #E1E5EC; font-family: system-ui, sans-serif; font-size: 13px; }
  .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid #1E2B45; }
  .logo { width: 28px; height: 28px; background: #FF6B35; border-radius: 8px; text-align: center; line-height: 28px; font-size: 14px; }
  .logo-text { font-weight: 600; font-size: 14px; }
  .body { padding: 14px 16px; }
  .label { font-size: 10px; color: #6B7A99; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; margin-top: 12px; }
  .label:first-child { margin-top: 0; }
  input { width: 100%; padding: 8px 10px; background: #131D30; border: 1px solid #2C3A5A; border-radius: 8px; color: #E1E5EC; font-size: 12px; }
  input:focus { outline: none; border-color: #FF6B35; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .btn-primary { background: #FF6B35; color: white; }
  .btn-ghost { background: #1E2B45; color: #9FABBE; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .stat { background: #131D30; border: 1px solid #1E2B45; border-radius: 10px; padding: 10px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-val.green { color: #34D399; }
  .stat-val.orange { color: #FF6B35; }
  .stat-lbl { font-size: 10px; color: #6B7A99; margin-top: 2px; }
  .pill { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .pill.active { background: rgba(52,211,153,.15); color: #34D399; }
  .pill.paused { background: rgba(251,191,36,.15); color: #fbbf24; }
  .pill.inactive { background: #1E2B45; color: #6B7A99; }
  .reason { font-size: 11px; color: #6B7A99; margin-top: 4px; margin-bottom: 8px; }
  .prog-bar { height: 4px; background: #1E2B45; border-radius: 2px; overflow: hidden; margin: 6px 0 4px; }
  .prog-fill { height: 100%; background: #34D399; border-radius: 2px; transition: width .4s; }
  .prog-text { font-size: 11px; color: #6B7A99; }
  .divider { height: 1px; background: #1E2B45; margin: 14px 0; }
  .note { font-size: 11px; color: #6B7A99; margin-top: 10px; line-height: 1.6; }
  #view-setup, #view-main { display: none; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🏠</div>
  <div class="logo-text">Listing Poster</div>
</div>

<div id="view-setup" class="body">
  <div class="label">Supabase Project URL</div>
  <input id="inp-url" type="text" placeholder="https://xxxx.supabase.co" />
  <div class="label">Supabase Anon Key</div>
  <input id="inp-key" type="text" placeholder="eyJhbGciOiJIUzI1NiIs..." />
  <div class="label">Campaign ID</div>
  <input id="inp-cid" type="text" placeholder="Paste from Supabase → campaigns table" />
  <button class="btn btn-primary" id="btn-save">Save & Connect</button>
  <p class="note">
    URL + Key → Supabase Dashboard → Project Settings → API<br>
    Campaign ID → Supabase → Table Editor → campaigns → copy the id column
  </p>
</div>

<div id="view-main" class="body">
  <div class="label">Status</div>
  <div id="m-pill" class="pill inactive">Loading…</div>
  <div id="m-reason" class="reason"></div>
  <div class="label">Progress</div>
  <div class="prog-bar"><div class="prog-fill" id="m-fill" style="width:0%"></div></div>
  <div class="prog-text" id="m-prog">Loading…</div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-val green" id="m-posted">—</div><div class="stat-lbl">Posted</div></div>
    <div class="stat"><div class="stat-val" id="m-pending">—</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val orange" id="m-failed">—</div><div class="stat-lbl">Failed</div></div>
    <div class="stat"><div class="stat-val" id="m-today">—</div><div class="stat-lbl">Today</div></div>
  </div>
  <div class="divider"></div>
  <div class="label">Switch Campaign ID</div>
  <input id="inp-new-cid" type="text" placeholder="Paste new Campaign ID" />
  <button class="btn btn-ghost" id="btn-switch">Switch Campaign</button>
  <button class="btn btn-ghost" id="btn-reset" style="margin-top:6px">Reset / Reconnect</button>
</div>

<script src="popup.js"></script>
</body>
</html>
